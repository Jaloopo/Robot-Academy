<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" role="img" aria-label="Tre knappar i rad: en rund knapp, en triangel-knapp (play) och en fyrkant-knapp (stopp).">
  <title>Edisons tre knappar</title>
  <desc>En rund knapp, en triangel-knapp (play) och en fyrkant-knapp (stopp).</desc>
  <!-- Rund knapp (programknappen) -->
  <circle cx="70" cy="70" r="44" fill="#ffffff" stroke="#1F2933" stroke-width="4"/>
  <circle cx="70" cy="70" r="13" fill="#F26B1D"/>
  <!-- Triangel-knapp (play) -->
  <circle cx="180" cy="70" r="44" fill="#ffffff" stroke="#1F2933" stroke-width="4"/>
  <polygon points="166,48 166,92 202,70" fill="#1F2933"/>
  <!-- Fyrkant-knapp (stopp) -->
  <circle cx="290" cy="70" r="44" fill="#ffffff" stroke="#1F2933" stroke-width="4"/>
  <rect x="272" y="52" width="36" height="36" rx="3" fill="#1F2933"/>
</svg>
